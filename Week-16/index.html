<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Manager with Undo/Redo</title>

<style>
    body {
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #667eea, #764ba2);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .container {
        background: white;
        padding: 25px;
        border-radius: 15px;
        width: 350px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
    }

    input {
        width: 70%;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #ccc;
    }

    button {
        padding: 10px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.2s;
    }

    .add-btn {
        background: #667eea;
        color: white;
    }

    .add-btn:hover {
        background: #5563d6;
    }

    .controls {
        display: flex;
        justify-content: space-between;
        margin: 10px 0;
    }

    .undo, .redo {
        background: #eee;
    }

    .undo:hover, .redo:hover {
        background: #ddd;
    }

    ul {
        list-style: none;
        padding: 0;
        margin-top: 15px;
    }

    li {
        background: #f5f5f5;
        padding: 10px;
        margin-bottom: 10px;
        border-radius: 8px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        animation: fadeIn 0.3s ease;
    }

    li.completed {
        text-decoration: line-through;
        color: gray;
    }

    .delete {
        background: red;
        color: white;
    }

    .delete:hover {
        background: darkred;
    }

    .stats {
        font-size: 14px;
        margin-top: 10px;
        text-align: center;
    }

    @keyframes fadeIn {
        from {opacity: 0; transform: translateY(10px);}
        to {opacity: 1; transform: translateY(0);}
    }

    @media(max-width: 400px) {
        .container {
            width: 90%;
        }
    }
</style>
</head>

<body>

<div class="container">
    <h2>Task Manager</h2>

    <div>
        <input type="text" id="taskInput" placeholder="Enter task...">
        <button class="add-btn" onclick="addTask()">Add</button>
    </div>

    <div class="controls">
        <button class="undo" onclick="undo()">Undo</button>
        <button class="redo" onclick="redo()">Redo</button>
    </div>

    <ul id="taskList"></ul>

    <div class="stats">
        Total: <span id="total">0</span> |
        Completed: <span id="completed">0</span>
    </div>
</div>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

// STACKS
let undoStack = [];
let redoStack = [];

// SAVE TO LOCAL STORAGE
function save() {
    localStorage.setItem("tasks", JSON.stringify(tasks));
}

// RENDER TASKS
function render() {
    let list = document.getElementById("taskList");
    list.innerHTML = "";

    let completedCount = 0;

    tasks.forEach((task, index) => {
        let li = document.createElement("li");
        li.textContent = task.text;

        if (task.completed) {
            li.classList.add("completed");
            completedCount++;
        }

        // TOGGLE COMPLETE
        li.onclick = () => {
            undoStack.push({
                action: "toggle",
                index: index
            });
            redoStack = [];

            task.completed = !task.completed;
            save();
            render();
        };

        // DELETE BUTTON
        let del = document.createElement("button");
        del.textContent = "X";
        del.className = "delete";

        del.onclick = (e) => {
            e.stopPropagation();

            if (!confirm("Delete this task?")) return;

            undoStack.push({
                action: "delete",
                task: task,
                index: index
            });

            redoStack = [];

            tasks.splice(index, 1);
            save();
            render();
        };

        li.appendChild(del);
        list.appendChild(li);
    });

    document.getElementById("total").textContent = tasks.length;
    document.getElementById("completed").textContent = completedCount;
}

// ADD TASK
function addTask() {
    let input = document.getElementById("taskInput");
    let text = input.value.trim();

    if (text === "") return;

    let newTask = { text: text, completed: false };

    tasks.push(newTask);

    // PUSH ACTION TO STACK
    undoStack.push({
        action: "add",
        index: tasks.length - 1
    });

    redoStack = [];

    input.value = "";
    save();
    render();
}

// UNDO FUNCTION
function undo() {
    if (undoStack.length === 0) return;

    let lastAction = undoStack.pop();
    redoStack.push(lastAction);

    /*
    STACK LOGIC:
    We reverse the action stored in stack
    */

    if (lastAction.action === "add") {
        tasks.splice(lastAction.index, 1);
    }

    else if (lastAction.action === "delete") {
        tasks.splice(lastAction.index, 0, lastAction.task);
    }

    else if (lastAction.action === "toggle") {
        tasks[lastAction.index].completed = 
        !tasks[lastAction.index].completed;
    }

    save();
    render();
}

// REDO FUNCTION
function redo() {
    if (redoStack.length === 0) return;

    let action = redoStack.pop();
    undoStack.push(action);

    /*
    REDO reapplies the same action
    */

    if (action.action === "add") {
        tasks.splice(action.index, 0, {text:"Restored Task", completed:false});
    }

    else if (action.action === "delete") {
        tasks.splice(action.index, 1);
    }

    else if (action.action === "toggle") {
        tasks[action.index].completed = 
        !tasks[action.index].completed;
    }

    save();
    render();
}

// INITIAL RENDER
render();
</script>

</body>
</html>
